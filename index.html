<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="SAION AI - Advanced AI Assistant by Saion Production" />
    <title>SAION AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; background: #000; }
      body { overflow: hidden; }
    </style>

    <!--
      CAPACITOR / ANDROID REDIRECT
      When the app is opened as a native Android APK (via Capacitor),
      window.Capacitor is defined. We redirect the hash to #/app
      so AppLayout (Login → Chat) loads instead of DownloadPage.
      Electron is handled by main.js passing hash: '/app' to loadFile().
    -->
    <script>
      (function () {
        var isCapacitor =
          typeof window !== 'undefined' &&
          window.Capacitor &&
          typeof window.Capacitor.isNativePlatform === 'function' &&
          window.Capacitor.isNativePlatform();

        if (isCapacitor) {
          // Force hash to /app so HashRouter lands on AppLayout
          if (window.location.hash !== '#/app' && window.location.hash !== '#/chat') {
            window.location.hash = '#/app';
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- puter.js — FREE AI image generation (no API key needed) -->
    <script src="https://js.puter.com/v2/"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
